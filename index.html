  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Saint James - Household Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root{--cream:#F7F4EF;--warm-white:#FDFBF8;--charcoal:#2C2C2C;--soft-gray:#8A8680;--border:#E5E0D8;--accent:#B5916C;--accent-light:#F0E6DA;--green:#6B8F71;--green-light:#EAF0EB;--red:#C0645A;--red-light:#F5ECEA;--blue:#5A7A9F;--blue-light:#EAF0F7;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;}
    #login-screen{position:fixed;inset:0;background:var(--charcoal);display:flex;align-items:center;justify-content:center;z-index:1000;transition:opacity 0.5s ease;}
    .login-box{background:var(--warm-white);padding:50px 44px;width:min(420px,92vw);border-radius:4px;text-align:center;}
    .lang-toggle{display:flex;gap:8px;justify-content:center;margin-bottom:30px;font-size:12px;}
    .lang-btn{padding:6px 12px;border:1px solid var(--border);background:transparent;color:var(--soft-gray);border-radius:3px;cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
    .lang-btn.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent);}
    .login-logo{font-family:'Playfair Display',serif;font-size:30px;letter-spacing:-0.5px;margin-bottom:4px;}
    .login-logo span{color:var(--accent);font-style:italic;}
    .login-sub{font-size:12px;color:var(--soft-gray);letter-spacing:1px;text-transform:uppercase;margin-bottom:34px;}
    .login-label{display:block;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--soft-gray);margin-bottom:8px;text-align:left;}
    .login-user-select{display:flex;gap:8px;margin-bottom:20px;}
    .user-btn{flex:1;padding:10px;border:1.5px solid var(--border);border-radius:3px;background:var(--cream);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;transition:all 0.2s;color:var(--charcoal);}
    .user-btn.active,.user-btn:hover{border-color:var(--accent);background:var(--accent-light);}
    .login-input{width:100%;padding:13px 15px;border:1.5px solid var(--border);border-radius:3px;font-family:'DM Sans',sans-serif;font-size:15px;background:var(--cream);color:var(--charcoal);margin-bottom:20px;outline:none;transition:border-color 0.2s;}
    .login-input:focus{border-color:var(--accent);}
    .login-btn{width:100%;padding:14px;background:var(--charcoal);color:white;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
    .login-btn:hover{background:#444;}
    .login-error{color:var(--red);font-size:13px;margin-top:10px;min-height:18px;}
    #app{display:none;}
    .header{background:var(--charcoal);color:white;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .header-logo{font-family:'Playfair Display',serif;font-size:19px;}
    .header-logo span{color:var(--accent);font-style:italic;}
    .header-right{display:flex;align-items:center;gap:12px;}
    .user-badge{font-size:12px;color:rgba(255,255,255,0.6);}
    .user-badge strong{color:white;}
    .logout-btn{font-size:12px;color:rgba(255,255,255,0.5);background:none;border:1px solid rgba(255,255,255,0.2);border-radius:3px;padding:4px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .logout-btn:hover{color:white;}
    .header-lang-toggle{display:flex;gap:4px;border-left:1px solid rgba(255,255,255,0.2);padding-left:12px;margin-left:12px;}
    .header-lang-btn{font-size:11px;color:rgba(255,255,255,0.5);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .header-lang-btn.active{color:white;font-weight:500;}
    .notice-board{background:#232323;border-top:1px solid rgba(255,255,255,0.08);padding:9px 20px;display:flex;align-items:center;gap:12px;min-height:40px;}
    .notice-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);white-space:nowrap;font-weight:500;}
    .notice-text{font-size:13px;color:rgba(255,255,255,0.8);flex:1;font-style:italic;}
    .notice-input{flex:1;padding:5px 10px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:3px;font-family:'DM Sans',sans-serif;font-size:13px;color:white;outline:none;}
    .notice-buttons{display:flex;gap:8px;}
    .notice-btn{padding:3px 8px;border:none;border-radius:3px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;}
    .notice-save{background:var(--accent);color:white;}
    .notice-cancel{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);}
    .notice-edit{background:none;color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.15);font-size:11px;}
    .notice-edit:hover{color:white;}
    .tabs{background:var(--warm-white);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0 16px;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab-btn{padding:13px 15px;font-size:12px;font-weight:500;color:var(--soft-gray);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;font-family:'DM Sans',sans-serif;}
    .tab-btn.active{color:var(--charcoal);border-bottom-color:var(--accent);}
    .tab-btn:hover{color:var(--charcoal);}
    .main{max-width:920px;margin:0 auto;padding:22px 18px;}
    .tab-section{display:none;}
    .tab-section.active{display:block;}
    h2{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:20px;color:var(--charcoal);}
    h3{font-family:'Playfair Display',serif;font-size:18px;margin:16px 0 12px 0;}
    .card{background:var(--warm-white);border:1px solid var(--border);border-radius:4px;padding:16px;margin-bottom:16px;}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
    .card-title{font-weight:500;font-size:14px;color:var(--charcoal);}
    .card-meta{font-size:12px;color:var(--soft-gray);display:flex;gap:12px;margin:8px 0;}
    .card-link{color:var(--accent);font-size:12px;cursor:pointer;text-decoration:none;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:12px;font-weight:500;color:var(--charcoal);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
    .form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:3px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--charcoal);background:var(--cream);}
    .form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-light);}
    .form-textarea{resize:vertical;min-height:80px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
    .form-row.full{grid-template-columns:1fr;}
    .button-group{display:flex;gap:12px;margin-top:16px;}
    .btn{padding:10px 16px;border:none;border-radius:3px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;}
    .btn-primary{background:var(--accent);color:white;}
    .btn-primary:hover{background:#9a7a5a;}
    .btn-secondary{background:var(--soft-gray);color:white;}
    .btn-secondary:hover{background:#6f5f5a;}
    .btn-success{background:var(--green);color:white;}
    .btn-success:hover{background:#5a7a61;}
    .btn-danger{background:var(--red);color:white;}
    .btn-danger:hover{background:#a84d45;}
    .btn-small{padding:6px 10px;font-size:11px;}
    .item{background:var(--warm-white);border-left:3px solid var(--border);border-radius:3px;padding:16px;margin-bottom:12px;transition:all 0.2s;}
    .item.high{border-left-color:var(--red);}
    .item.medium{border-left-color:var(--accent);}
    .item.low{border-left-color:var(--green);}
    .item-row{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
    .item-content{flex:1;}
    .item-title{font-weight:500;font-size:14px;color:var(--charcoal);margin-bottom:6px;}
    .item-text{font-size:13px;color:var(--charcoal);margin-bottom:8px;}
    .item-meta{font-size:12px;color:var(--soft-gray);display:flex;gap:12px;flex-wrap:wrap;}
    .item-actions{display:flex;gap:8px;}
    .badge{display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;font-weight:500;}
    .badge-status{background:var(--accent-light);color:var(--accent);}
    .badge-priority{background:var(--red-light);color:var(--red);}
    .badge-priority.medium{background:var(--accent-light);color:var(--accent);}
    .badge-priority.low{background:var(--green-light);color:var(--green);}
    .badge-category{background:var(--blue-light);color:var(--blue);}
    .empty-state{text-align:center;padding:40px 20px;color:var(--soft-gray);}
    .empty-state-icon{font-size:48px;margin-bottom:12px;}
    .dashboard-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
    @media (max-width:768px){.dashboard-grid{grid-template-columns:1fr;}}
    .dashboard-card{background:var(--warm-white);border:1px solid var(--border);border-radius:4px;padding:16px;}
    .dashboard-card h3{margin-top:0;font-size:16px;}
    .dashboard-card-content{margin:12px 0;}
    .dashboard-item{padding:10px 0;border-bottom:1px solid var(--accent-light);font-size:13px;}
    .dashboard-item:last-child{border-bottom:none;}
    .dashboard-item-title{font-weight:500;color:var(--charcoal);}
    .dashboard-item-meta{font-size:12px;color:var(--soft-gray);margin-top:4px;}
    .bulk-textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:3px;font-family:'DM Sans',sans-serif;font-size:13px;min-height:120px;resize:vertical;}

</head>

<div id="login-screen">

      <span style="color:var(--soft-gray);font-size:11px;">|</span>
      <button class="lang-btn" data-lang="fr">FR</button>
    </div>
    <div class="login-logo">Saint <span>James</span></div>

</div>

<!-- Main App -->
<div id="app">
  <div class="header">
    <div class="header-logo">Saint <span>James</span></div>

        <button class="header-lang-btn" data-lang="fr" id="header-lang-fr">FR</button>
      </div>
      <button class="logout-btn" id="header-logout">Logout</button>
    </div>
  </div>

  <div class="notice-board">
    <div class="notice-label">📌 Notice</div>
    <div class="notice-text" id="notice-text">Welcome to Saint James</div>
    <div class="notice-input" style="display:none;" id="notice-input-container">

    </div>
    <div class="notice-buttons">
      <button class="notice-btn notice-edit" id="notice-edit-btn">Edit</button>
      <button class="notice-btn notice-save" id="notice-save-btn" style="display:none;">Save</button>
      <button class="notice-btn notice-cancel" id="notice-cancel-btn" style="display:none;">Cancel</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="main" id="content"></div>
</div>

// ===== INITIALIZATION =====
async function initApp() {
  setupLoginScreen();

  setupNoticeBoard();

}

function setupLoginScreen() {
  const langBtns = document.querySelectorAll('.lang-toggle .lang-btn');
  langBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      state.lang = e.target.dataset.lang;
      localStorage.setItem('sj-lang', state.lang);
      updateLoginScreenText();
      langBtns.forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
    });
  });

  const userContainer = document.getElementById('login-users');
  Object.keys(USERS).forEach(username => {
    const btn = document.createElement('button');
    btn.className = 'user-btn';
    btn.textContent = username;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.user = username;
    });
    userContainer.appendChild(btn);
  });

  document.getElementById('login-submit').addEventListener('click', handleLogin);
  document.getElementById('login-pwd').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') handleLogin();
  });

  // Set initial lang
  const activeLang = state.lang;
  langBtns.forEach(btn => {
    if (btn.dataset.lang === activeLang) btn.classList.add('active');
  });
  updateLoginScreenText();
}

function updateLoginScreenText() {
  document.getElementById('login-sub').textContent = t('login.subtitle');
  document.getElementById('login-label-user').textContent = t('login.who');
  document.getElementById('login-pwd').placeholder = t('login.password');
  document.getElementById('login-submit').textContent = t('login.enter');
}

function handleLogin() {
  const pwd = document.getElementById('login-pwd').value;
  const error = document.getElementById('login-error');

  if (!state.user) {
    error.textContent = t('login.error');
    return;
  }

  if (USERS[state.user] !== pwd) {
    error.textContent = t('login.error');
    return;
  }

  error.textContent = '';
  loginUser();
}

function loginUser() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('header-user').textContent = state.user;
  renderApp();
}

function setupHeaderLangToggle() {
  document.getElementById('header-lang-en').addEventListener('click', () => {
    state.lang = 'en';
    localStorage.setItem('sj-lang', state.lang);
    updateHeaderLangButtons();
    renderApp();
  });
  document.getElementById('header-lang-fr').addEventListener('click', () => {
    state.lang = 'fr';
    localStorage.setItem('sj-lang', state.lang);
    updateHeaderLangButtons();
    renderApp();
  });

  document.getElementById('header-logout').addEventListener('click', () => {
    state.user = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('login-pwd').value = '';
    document.getElementById('login-error').textContent = '';
    document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
  });
}

function updateHeaderLangButtons() {
  document.getElementById('header-lang-en').classList.toggle('active', state.lang === 'en');
  document.getElementById('header-lang-fr').classList.toggle('active', state.lang === 'fr');
}

function setupNoticeBoard() {
  const editBtn = document.getElementById('notice-edit-btn');
  const saveBtn = document.getElementById('notice-save-btn');
  const cancelBtn = document.getElementById('notice-cancel-btn');
  const textDiv = document.getElementById('notice-text');
  const inputContainer = document.getElementById('notice-input-container');
  const input = document.getElementById('notice-input');

  editBtn.addEventListener('click', () => {
    textDiv.style.display = 'none';
    inputContainer.style.display = 'block';
    input.value = state.notice;
    editBtn.style.display = 'none';
    saveBtn.style.display = 'inline-block';
    cancelBtn.style.display = 'inline-block';
    input.focus();
  });

  saveBtn.addEventListener('click', () => {
    state.notice = input.value;
    saveNotice();
  });

  cancelBtn.addEventListener('click', () => {
    textDiv.style.display = 'block';
    inputContainer.style.display = 'none';
    editBtn.style.display = 'inline-block';
    saveBtn.style.display = 'none';
    cancelBtn.style.display = 'none';
  });
}

function saveNotice() {
  document.getElementById('notice-text').textContent = state.notice;
  document.getElementById('notice-text').style.display = 'block';
  document.getElementById('notice-input-container').style.display = 'none';
  document.getElementById('notice-edit-btn').style.display = 'inline-block';
  document.getElementById('notice-save-btn').style.display = 'none';
  document.getElementById('notice-cancel-btn').style.display = 'none';
}

// ===== APP RENDERING =====
function renderApp() {
  renderTabs();
  renderContent();
}

function renderTabs() {
  const tabsContainer = document.getElementById('tabs');
  tabsContainer.innerHTML = '';

  const tabs = ['dashboard', 'tasks', 'messages', 'orders', 'documents', 'calendar', 'inventory', 'works'];
  tabs.forEach((tab, idx) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = t(`tab.${tab}`);
    btn.addEventListener('click', () => switchTab(tab));
    tabsContainer.appendChild(btn);
  });
}

function switchTab(tabName) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));

  const tabs = ['dashboard', 'tasks', 'messages', 'orders', 'documents', 'calendar', 'inventory', 'works'];
  const idx = tabs.indexOf(tabName);
  const tabBtns = document.querySelectorAll('.tab-btn');
  if (tabBtns[idx]) tabBtns[idx].classList.add('active');
  const section = document.getElementById(`tab-${tabName}`);
  if (section) section.classList.add('active');
  if (tabName === 'messages') {
    setTimeout(() => { const c = document.getElementById('chat-msgs'); if (c) c.scrollTop = c.scrollHeight; }, 50);
  }
}

function renderContent() {
  const content = document.getElementById('content');
  content.innerHTML = '';

  // Dashboard
  content.appendChild(createTabSection('dashboard', renderDashboard()));

  // Tasks
  content.appendChild(createTabSection('tasks', renderTasks()));

  // Messages
  content.appendChild(createTabSection('messages', renderMessages()));

  // Orders
  content.appendChild(createTabSection('orders', renderOrders()));

  // Documents
  content.appendChild(createTabSection('documents', renderDocuments()));

  // Calendar
  content.appendChild(createTabSection('calendar', renderCalendar()));

  // Inventory
  content.appendChild(createTabSection('inventory', renderInventory()));

  // Works/Repairs
  content.appendChild(createTabSection('works', renderWorks()));

  // Activate first tab
  switchTab('dashboard');
}

function createTabSection(name, content) {
  const section = document.createElement('div');
  section.className = 'tab-section';
  section.id = `tab-${name}`;
  if (name === 'dashboard') section.classList.add('active');
  section.appendChild(content);
  return section;
}

  assignLabel.textContent = t('tasks.assigned');
  const assignSel = document.createElement('select');
  assignSel.className = 'form-select';
  Object.keys(USERS).forEach(user => {

    opt.value = user;
    opt.textContent = user;
    assignSel.appendChild(opt);
  });
  assignGrp.appendChild(assignLabel);

  btn.className = 'btn btn-primary';
  btn.textContent = t('tasks.add');
  btn.addEventListener('click', (e) => {
    e.preventDefault();
    const newTask = {
      id: Date.now(),
      name: nameInput.value,
      room: roomSel.value,
      priority: prioritySel.value,
      assigned: assignSel.value,
      status: 'todo'
    };
    if (newTask.name) {
      state.tasks.push(newTask);
      nameInput.value = '';
      renderContent();
    }
  });
  btnGrp.appendChild(btn);
  form.appendChild(btnGrp);
  div.appendChild(form);

  const list = document.createElement('div');
  list.className = 'item-list';
  if (state.tasks.length === 0) {
    list.appendChild(createEmptyState());

      const item = document.createElement('div');
      item.className = `item ${task.priority}`;
      item.innerHTML = `

        state.tasks = state.tasks.filter(t => t.id !== task.id);
        renderContent();
      });
      list.appendChild(item);
    });
  }
  div.appendChild(list);
  return div;

            id: Date.now() + Math.random(),
            item: item,
            notes: notes,
            status: 'pending'
          });
        }
      });
      renderContent();
    }

  form.appendChild(btnGrp);
  div.appendChild(form);

  const list = document.createElement('div');
  list.className = 'item-list';

    list.appendChild(createEmptyState());

    state.orders.forEach(order => {
      const item = document.createElement('div');
      item.className = 'item';
      const statusColors = {
        pending: 'accent',
        ordered: 'blue',
        delivered: 'green'
      };
      item.innerHTML = `
        <div class="item-row">
          <div class="item-content">
            <div class="item-title">${order.item}</div>
            <div class="item-meta">
              ${order.notes ? `<span>${order.notes}</span>` : ''}
              <span class="badge badge-status">${t(`orders.${order.status}`)}</span>
            </div>
          </div>
          <div class="item-actions">
            <button class="btn btn-small btn-secondary">→</button>
            <button class="btn btn-small btn-danger">✕</button>
          </div>
        </div>
      `;
      const buttons = item.querySelectorAll('button');
      buttons[0].addEventListener('click', () => {
        const statuses = ['pending', 'ordered', 'delivered'];
        const idx = statuses.indexOf(order.status);
        order.status = statuses[(idx + 1) % statuses.length];
        renderContent();
      });
      buttons[1].addEventListener('click', () => {
        state.orders = state.orders.filter(o => o.id !== order.id);
        renderContent();
      });
      list.appendChild(item);
    });
  }
  div.appendChild(list);
  return div;
}
